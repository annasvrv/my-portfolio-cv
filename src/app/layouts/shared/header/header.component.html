<header class="header container">
  <a class="logo" [routerLink]="'/'">
    <img
      src="assets/harbour-logo.png"
      alt="logo"
      width="55"
      height="60"
      class="logo__imgage"
    />
    <p class="logo__text">AnnaS</p>
  </a>

  <button class="header-button" (click)="toggleSidebarMenu()">
    <span class="fa-solid fa-bars"></span>
  </button>

  <stb-navigation class="header-nav"></stb-navigation>
  <stb-sidebar-menu
    class="header-sidebar"
    [class.open]="isOpen"
  ></stb-sidebar-menu>
</header>
