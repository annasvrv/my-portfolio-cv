<nav class="navigation">
  <ul class="navigation__list">
    <li *ngFor="let link of navLinks$ | async" class="navigation__item">
      <a
        [routerLink]="link.url"
        routerLinkActive="active"
        class="navigation__link"
      >
        {{ link.name }}
      </a>
    </li>
  </ul>
</nav>
